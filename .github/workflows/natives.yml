name: natives

# Builds + tests the per-classifier native bundles on each supported
# OS+arch matrix entry. Runs the FFM-binding smoke tests on each so
# missing libraries / ABI breakage are caught before release.
#
# Triggered on:
#   - any push to main (gating release)
#   - any pull request (catching regressions in PRs)
#   - manual dispatch (for experimental cuts)

on:
  push:
    branches: [main, master]
    paths:
      - 'modules/lib/src/main/java/com/github/auties00/cobalt/call/**'
      - 'modules/lib/src/main/natives/**'
      - 'modules/lib/pom.xml'
      - 'modules/lib/dependencies/**'
      - 'modules/call-toolkit/src/main/java/**'
      - 'modules/call-toolkit/pom.xml'
      - 'modules/call-toolkit/dependencies/**'
      - 'modules/call-toolkit/scripts/**'
      - '.github/workflows/natives.yml'
  pull_request:
    paths:
      - 'modules/lib/src/main/java/com/github/auties00/cobalt/call/**'
      - 'modules/lib/src/main/natives/**'
      - 'modules/lib/pom.xml'
      - 'modules/lib/dependencies/**'
      - 'modules/call-toolkit/src/main/java/**'
      - 'modules/call-toolkit/pom.xml'
      - 'modules/call-toolkit/dependencies/**'
      - 'modules/call-toolkit/scripts/**'
      - '.github/workflows/natives.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.classifier }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            classifier: linux-x86_64
          - os: ubuntu-24.04-arm
            classifier: linux-aarch64
          - os: macos-latest
            classifier: darwin-aarch64
          - os: macos-13
            classifier: darwin-x86_64
          - os: windows-latest
            classifier: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build cobalt-lib (without natives)
        run: mvn -B -pl modules/lib -am -DskipTests package

      - name: Run FFM-binding smoke tests
        run: mvn -B -pl modules/lib test -Dtest='com.github.auties00.cobalt.call.audio.opus.*,com.github.auties00.cobalt.call.audio.processing.*,com.github.auties00.cobalt.call.video.vpx.*,com.github.auties00.cobalt.call.video.h264.*,com.github.auties00.cobalt.call.transport.sctp.SctpAssociationTest'
        env:
          # The natives are expected to be on the system path or
          # bundled per-classifier; the smoke tests will fail loud
          # if any binding fails to load.
          MAVEN_OPTS: '--enable-preview --add-modules jdk.incubator.vector --enable-native-access=ALL-UNNAMED'

      - name: Build the classifier-specific native bundle JAR
        run: mvn -B -pl modules/lib -am package -Pnatives -Dnatives.classifier=${{ matrix.classifier }} -DskipTests

      - name: Upload native bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-natives-${{ matrix.classifier }}
          path: modules/lib/target/cobalt-*-natives-${{ matrix.classifier }}.jar
          if-no-files-found: warn

      - name: Build the call-toolkit classifier-specific native bundle JAR
        run: mvn -B -pl modules/call-toolkit -am package -Pnatives -Dnatives.classifier=${{ matrix.classifier }} -DskipTests

      - name: Upload call-toolkit native bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobalt-call-toolkit-natives-${{ matrix.classifier }}
          path: modules/call-toolkit/target/cobalt-call-toolkit-*-natives-${{ matrix.classifier }}.jar
          if-no-files-found: warn
